<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Padding </title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

  <h1 class="text-2xl font-bold mb-6 text-center">Tailwind Padding </h1>


  <div class="bg-blue-500 text-white p-6 mb-4">
    p-6 → All sides padding
  </div>

  
  <div class="bg-green-500 text-white pt-6 mb-4">
    pt-6 → Padding Top
  </div>

  
  <div class="bg-yellow-500 text-black pb-6 mb-4">
    pb-6 → Padding Bottom
  </div>

  
  <div class="bg-purple-500 text-white pl-6 mb-4">
    pl-6 → Padding Left
  </div>

  
  <div class="bg-pink-500 text-white pr-6 mb-4">
    pr-6 → Padding Right
  </div>

  
  <div class="bg-indigo-500 text-white px-6 mb-4">
    px-6 → Left + Right Padding
  </div>

  
  <div class="bg-red-500 text-white py-6 mb-4">
    py-6 → Top + Bottom Padding
  </div>

  
  <div class="bg-gray-800 text-white pt-2 pr-8 pb-4 pl-6 mb-4">
    Different Padding → pt-2 pr-8 pb-4 pl-6
  </div>

  
  <div class="bg-teal-500 text-white p-2 md:p-6 lg:p-10">
    Responsive Padding → Small (p-2), Medium (p-6), Large (p-10)
  </div>

</body>
</html>
