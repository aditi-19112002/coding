<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
   <div class="bg-[url('https://wallpapertag.com/wallpaper/full/b/1/3/631837-beautiful-scenery-wallpapers-2880x1800-htc.jpg')] h-screen  bg-no-repeat bg-cover">
  
  <div class="flex justify-between p-4">
   <div>
  <a href="" class="text-white text-2xl font-bold">Aditi Keshri </a>
    
   </div>
   <div class="space-x-4">
    <a href="" class="text-white hover:text-pink-500">Home</a>
    <a href="" class="text-white hover:text-pink-500">About</a>
    <a href="" class="text-white hover:text-pink-500">Contact</a>
    <button class="bg-pink-500 hover:bg-pink-600 text-white px-2 py-2 rounded-full text-sm">
      Follow me
    </button>
   </div>
  </div>

  <div class="flex justify-between p-20">
    <div>
      <h2 class="text-3xl text-white font-bold mb-4">Welcome to My Website</h2>
      <p class="text-lg text-white mb-6">
        Discover amazing content and stay updated with the latest news.
      </p>
      <button class="bg-pink-500 hover:bg-pink-600 text-white px-6 py-3 rounded-full text-lg font-semibold transition">
        Get Started
      </button>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">


    <h2 class="text-2xl font-semibold text-gray-800 mb-1">Create your account</h2>
    <p class="text-sm text-gray-500 mb-6">Start your journey with us</p>

    <form class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>

      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>

      <button
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">
        Create Account
      </button>

    </form>


    <p class="text-sm text-center text-gray-500 mt-6">
      Already have an account?
      <a href="#" class="text-blue-600 font-medium">Sign in</a>
    </p>

  </div>
  </div>

</div> 
</body>
</html>
