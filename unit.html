<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4">

  <div class="w-[320px] h-[600px] bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col">

   
    <div class="bg-green-600 text-white p-3 flex items-center justify-between">
     <div class="flex items-center gap-2">
        <img src="aditi.jpg" alt="Profile" class="w-10 h-10 rounded-full">
        <div>
          <h2 class="text-sm font-semibold">Family Group</h2>
          <p class="text-xs opacity-80">Binit Krishna...</p>
        </div>
      </div>
      <div class="flex gap-3 text-lg">
        📎 ⋮
      </div>
    </div>

  
    <div class="flex-1 p-3 space-y-3 overflow-y-auto bg-gray-100">

   
      <div class="bg-white rounded-lg overflow-hidden">
        <img src="https://picsum.photos/300/200" class="w-full">
      </div>

     
      <div class="bg-green-200 p-2 rounded-lg w-fit ml-auto">
        🎤 Voice message
      </div>

    
      <div class="bg-white p-3 rounded-lg w-fit">
        <p class="text-sm">OMG hahaha, your are  looking so fineeee!</p>
      </div>

      
      <div class="bg-white p-3 rounded-lg w-fit">
        <p class="text-sm">Why are you asking how was their trip 😂</p>
      </div>

   
      <div class="bg-green-200 p-2 rounded-lg w-fit ml-auto">
        😍 🌸 📷 🌞 👍
      </div>

    </div>

   
    <div class="p-2 bg-gray-100 flex items-center gap-2">
      <input type="text" placeholder="Message"
        class="flex-1 p-2 rounded-full outline-none">
      <button class="bg-green-500 text-white w-8 h-8  rounded-full hover:bg-green-600">
           ➤
      </button>
    </div>

  </div>


  <div class="w-[320px] h-[600px] bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col">

 
    <div class="bg-green-600 text-white p-3 flex justify-between items-center">
      <h1 class="font-semibold">WhatsApp</h1>
      <div class="flex gap-3">🔍 ⋮</div>
    </div>

  
    <div class="flex justify-around text-sm border-b py-2">
      <span class="font-semibold border-b-2 border-green-600">Chats</span>
      <span>Status</span>
      <span>Calls</span>
    </div>


    <div class="flex-1 overflow-y-auto">

      <!-- Item -->
      <div class="flex items-center gap-3 p-3 hover:bg-gray-100 cursor-pointer">
        <img src="https://i.pravatar.cc/40" class="w-10 h-10 rounded-full">
        <div class="flex-1">
          <h2 class="font-semibold text-sm">Tunni</h2>
          <p class="text-xs text-gray-500">We’re on our way</p>
        </div>
        <span class="text-xs text-green-600">9:32</span>
      </div>

      
      <div class="flex items-center gap-3 p-3 hover:bg-gray-100">
        <img src="https://i.pravatar.cc/41" class="w-10 h-10 rounded-full">
        <div class="flex-1">
          <h2 class="font-semibold text-sm">Binit</h2>
          <p class="text-xs text-green-500">typing...</p>
        </div>
        <span class="text-xs text-green-600">9:10</span>
      </div>

    
      <div class="flex items-center gap-3 p-3 hover:bg-gray-100">
        <img src="https://i.pravatar.cc/42" class="w-10 h-10 rounded-full">
        <div class="flex-1">
          <h2 class="font-semibold text-sm">Krishna</h2>
          <p class="text-xs text-gray-500">It’s been settled already</p>
        </div>
        <span class="text-xs text-green-600">8:59</span>
      </div>

    </div>

  
    <div class="absolute bottom-6 right-6">
      <button class="bg-green-600 text-white p-4 rounded-full shadow-lg">
         ➤
      </button>
    </div>

  </div>

</div>

</body>
</html>
