<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Scroller</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Hide scrollbar */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gray-100 p-6">

  <div class="flex gap-4 overflow-y-auto ">

    <img src="https://picsum.photos/300/200?1" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?2" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?3" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?4" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?5" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?6" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?7" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?8" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?9" class="min-w-[300px] rounded-lg">
    <img src="https://picsum.photos/300/200?10" class="min-w-[300px] rounded-lg">

  </div>

</body>
</html>
