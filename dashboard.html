<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="flex">

 
    <div class="w-64 h-screen bg-gray-900 text-white p-5 hidden md:block">
      <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
      <ul class="space-y-4">
        <li class="hover:text-blue-400 cursor-pointer">🏠 Home</li>
        <li class="hover:text-blue-400 cursor-pointer">📊 Analytics</li>
        <li class="hover:text-blue-400 cursor-pointer">👥 Users</li>
        <li class="hover:text-blue-400 cursor-pointer">⚙️ Settings</li>
      </ul>
    </div>


    <div class="flex-1 p-6">

      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Admin Panel</h1>
        <button class="bg-blue-500 text-white px-4 py-2 rounded-lg">
          Logout
        </button>
      </div>

   
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        <div class="bg-gray-700 p-5 rounded-xl shadow">
          <h3 class="text-gray-100">Users</h3>
          <p class="text-2xl font-bold text-gray-100">1,250</p>
        </div>

        <div class="bg-gray-700 p-5 rounded-xl shadow">
          <h3 class="text-gray-100">Revenue</h3>
          <p class="text-2xl font-bold text-gray-100">$5,400</p>
        </div>

        <div class="bg-gray-700 p-5 rounded-xl shadow">
          <h3 class="text-gray-100">Orders</h3>
          <p class="text-2xl font-bold text-gray-100">320</p>
        </div>

      </div>

     
      <div class="bg-gray-700 mt-8 p-5 rounded-xl shadow">
        <h2 class="text-lg font-bold mb-4 text-white">Recent Users</h2>

        <table class="w-full text-left">
          <thead>
            <tr class="border-b">
              <th class="py-2 text-white">Name</th>
              <th class="py-2 text-white">Email</th>
              <th class="py-2 text-white">Status</th>
            </tr>
          </thead>

          <tbody>
            <tr class="border-b hover:bg-gray-100">
              <td class="py-2 text-white">Aditi</td>
              <td class="text-white">aditi@mail.com</td>
             <td class="px-2 py-2">
  <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-sm font-semibold">
    Active
  </span>
</td>
            </tr>

            <tr class="border-b hover:bg-gray-100">
              <td class="py-2 text-white">Krishna</td>
              <td class="text-white">krishna@mail.com</td>
             <td class="px-2 py-2">
  <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-sm font-semibold">
    Inactive
  </span>
</td>
            </tr>

            <tr class="hover:bg-gray-100">
              <td class="py-2 text-white">Binit</td>
              <td class="text-white">binit@mail.com</td>
              <td class="px-2 py-2">
  <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-sm font-semibold">
    Active
  </span>
</td>
            </tr>
          </tbody>
        </table>

      </div>

    </div>

  </div>

</body>
</html>
