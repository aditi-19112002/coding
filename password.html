<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

  <div class="bg-white p-6 rounded-xl shadow-lg w-80 text-center">
    <h1 class="text-xl font-bold mb-4">Password Generator</h1>

 
    <input id="password" type="text" readonly
      class="w-full p-2 border rounded mb-4 text-center">

  
    <input id="length" type="number" value="8" min="4" max="20"
      class="w-full p-2 border rounded mb-4">

  
    <div class="text-left mb-4 space-y-2">
      <label><input type="checkbox" id="uppercase" checked> Uppercase</label><br>
      <label><input type="checkbox" id="lowercase" checked> Lowercase</label><br>
      <label><input type="checkbox" id="numbers" checked> Numbers</label><br>
      <label><input type="checkbox" id="symbols"> Symbols</label>
    </div>

  
    <button onclick="generatePassword()"
      class="bg-blue-500 text-white px-4 py-2 rounded w-full mb-2">
      Generate
    </button>

    <button onclick="copyPassword()"
      class="bg-green-500 text-white px-4 py-2 rounded w-full">
      Copy
    </button>
  </div>

<script>
function generatePassword() {
  let length = document.getElementById("length").value;

  let upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  let lower = "abcdefghijklmnopqrstuvwxyz";
  let number = "0123456789";
  let symbol = "!@#$%^&*()_+";

  let allChars = "";

  if (document.getElementById("uppercase").checked) allChars += upper;
  if (document.getElementById("lowercase").checked) allChars += lower;
  if (document.getElementById("numbers").checked) allChars += number;
  if (document.getElementById("symbols").checked) allChars += symbol;

  if (allChars === "") {
    alert("Select at least one option!");
    return;
  }

  let password = "";

  for (let i = 0; i < length; i++) {
    let randomIndex = Math.floor(Math.random() * allChars.length);
    password += allChars[randomIndex];
  }

  document.getElementById("password").value = password;
}

function copyPassword() {
  let passField = document.getElementById("password");

  passField.select();
  document.execCommand("copy");

  alert("Password Copied!");
}
</script>

</body>
</html>
