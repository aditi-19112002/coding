<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-7xl mx-auto p-5">

    <h1 class="text-3xl font-bold text-center mb-8">
      Responsive Card Design
    </h1>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">

      <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
        <img src="https://picsum.photos/400/250" class="w-full" alt="">
        <div class="p-5">
          <h2 class="text-xl font-semibold mb-2">Web Design</h2>
          <p class="text-gray-600 mb-4">
            Learn modern responsive web design using Tailwind CSS framework.
          </p>
          <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Read More
          </button>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
        <img src="https://picsum.photos/401/250" class="w-full" alt="">
        <div class="p-5">
          <h2 class="text-xl font-semibold mb-2">JavaScript</h2>
          <p class="text-gray-600 mb-4">
            Build interactive websites and projects using JavaScript.
          </p>
          <button class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
            Read More
          </button>
        </div>
      </div>

  
      <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition">
        <img src="https://picsum.photos/402/250" class="w-full" alt="">
        <div class="p-5">
          <h2 class="text-xl font-semibold mb-2">Laravel</h2>
          <p class="text-gray-600 mb-4">
            Create powerful backend applications using Laravel framework.
          </p>
          <button class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">
            Read More
          </button>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
