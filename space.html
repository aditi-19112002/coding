<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind Spacing Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

  <h1 class="text-2xl font-bold mb-4">Horizontal Space (space-x-4)</h1>
  
  <div class="flex space-x-4 mb-10">
    <div class="bg-blue-500 text-white p-5 rounded">Box 1</div>
    <div class="bg-red-500 text-white p-5 rounded">Box 2</div>
    <div class="bg-green-500 text-white p-5 rounded">Box 3</div>
  </div>


  <h1 class="text-2xl font-bold mb-4">Vertical Space (space-y-4)</h1>
  
  <div class="space-y-4 mb-10">
    <div class="bg-purple-500 text-white p-5 rounded">Box 1</div>
    <div class="bg-pink-500 text-white p-5 rounded">Box 2</div>
    <div class="bg-yellow-500 text-white p-5 rounded">Box 3</div>
  </div>


  
  <h1 class="text-2xl font-bold mb-4">Gap (gap-4)</h1>
  
  <div class="flex gap-4 mb-10">
    <div class="bg-indigo-500 text-white p-5 rounded">Box 1</div>
    <div class="bg-teal-500 text-white p-5 rounded">Box 2</div>
    <div class="bg-orange-500 text-white p-5 rounded">Box 3</div>
  </div>


 
  <h1 class="text-2xl font-bold mb-4">Margin Example</h1>
  
  <div class="bg-gray-300 p-5">
    <div class="bg-blue-600 text-white p-5 m-4 rounded">Box with margin (m-4)</div>
  </div>


 
  <h1 class="text-2xl font-bold mb-4">Padding Example</h1>
  
  <div class="bg-red-500 text-white p-10 rounded">
    This box has padding (p-10)
  </div>


</body>
</html>
