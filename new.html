<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOW Calculator</title>


<script src="https://cdn.tailwindcss.com"></script>

<style>

.glow {
  box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
}


button:active {
  transform: scale(0.9);
}
</style>
</head>

<body class="bg-slate-900 flex justify-center items-center h-screen font-sans">

<div class="bg-slate-800 p-5 rounded-2xl shadow-2xl w-[300px]">

  <input id="display" 
    class="w-full h-16 mb-4 text-right text-2xl px-3 rounded-xl bg-black text-white outline-none glow"
    disabled value="0">

  <div class="grid grid-cols-4 gap-3">

    <button onclick="clearDisplay()" class="col-span-2 bg-red-500 text-white p-3 rounded-xl">C</button>
    <button onclick="append('/') " class="bg-yellow-500 text-white p-3 rounded-xl">/</button>
    <button onclick="append('*')" class="bg-yellow-500 text-white p-3 rounded-xl">*</button>

    <button onclick="append('7')" class="bg-slate-600 text-white p-3 rounded-xl">7</button>
    <button onclick="append('8')" class="bg-slate-600 text-white p-3 rounded-xl">8</button>
    <button onclick="append('9')" class="bg-slate-600 text-white p-3 rounded-xl">9</button>
    <button onclick="append('-')" class="bg-yellow-500 text-white p-3 rounded-xl">-</button>

    <button onclick="append('4')" class="bg-slate-600 text-white p-3 rounded-xl">4</button>
    <button onclick="append('5')" class="bg-slate-600 text-white p-3 rounded-xl">5</button>
    <button onclick="append('6')" class="bg-slate-600 text-white p-3 rounded-xl">6</button>
    <button onclick="append('+')" class="bg-yellow-500 text-white p-3 rounded-xl">+</button>

    <button onclick="append('1')" class="bg-slate-600 text-white p-3 rounded-xl">1</button>
    <button onclick="append('2')" class="bg-slate-600 text-white p-3 rounded-xl">2</button>
    <button onclick="append('3')" class="bg-slate-600 text-white p-3 rounded-xl">3</button>
    <button onclick="calculate()" class="bg-green-500 text-white p-3 rounded-xl row-span-2 flex items-center justify-center">=</button>

    <button onclick="append('0')" class="col-span-2 bg-slate-600 text-white p-3 rounded-xl">0</button>
    <button onclick="append('.') " class="bg-slate-600 text-white p-3 rounded-xl">.</button>

  </div>
</div>

<script>
let display = document.getElementById("display");

function append(value){
  if(display.value === "0") display.value = "";
  display.value += value;
}

function clearDisplay(){
  display.value = "0";
}

function calculate(){
  try{
    display.value = eval(display.value);
  }catch{
    display.value = "Error";
  }
}
</script>

</body>
</html>
