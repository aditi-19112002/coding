<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centered Chat UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

  <!-- Center Box -->
  <div class="w-[90%] sm:w-96 md:w-[400px] bg-white rounded-2xl shadow-2xl p-4">

    <!-- Header -->
    <div class="flex justify-between items-center border-b pb-2">
      <h2 class="font-bold text-lg">Chat</h2>
      <span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full animate-bounce">3</span>
    </div>

    <!-- Chat Messages -->
    <div id="chatArea" class="h-48 overflow-y-auto my-3 text-sm text-gray-600 space-y-2">
      <p class="bg-gray-200 p-2 rounded-lg w-fit">Hello 👋</p>
      <p class="bg-gray-200 p-2 rounded-lg w-fit">How can I help you?</p>
    </div>

    <!-- Input -->
    <div class="flex gap-2">
      <input id="msg" type="text" placeholder="Type message..."
        class="flex-1 border rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">

      <button onclick="sendMsg()" 
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 rounded-lg">
        Send
      </button>
    </div>

  </div>

  <!-- JavaScript -->
  <script>
    function sendMsg() {
      let input = document.getElementById("msg");
      let chat = document.getElementById("chatArea");

      if (input.value.trim() !== "") {
        let p = document.createElement("p");
        p.textContent = input.value;
        p.className = "bg-blue-500 text-white p-2 rounded-lg w-fit ml-auto";

        chat.appendChild(p);
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
      }
    }
  </script>

</body>
</html>
