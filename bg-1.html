<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section with Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<div class="bg-[url('https://wallpapertag.com/wallpaper/full/b/1/3/631837-beautiful-scenery-wallpapers-2880x1800-htc.jpg')] h-screen bg-cover bg-center">

    <!-- Navbar -->
    <div class="flex justify-between items-center p-6">
        <h1 class="text-2xl text-white font-bold">Aditi Keshri</h1>

        <div class="space-x-6">
            <a href="#" class="text-white font-semibold">Home</a>
            <a href="#" class="text-white font-semibold">About</a>
            <a href="#" class="text-white font-semibold">Contact</a>
            <button class="px-4 py-2 rounded-full bg-pink-500 text-white hover:bg-pink-600">Follow me</button>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="flex items-center justify-between px-20 py-16">

        <!-- Left Content -->
        <div class="max-w-lg">
            <h2 class="text-4xl text-white font-bold mb-4">
                Welcome to My Website
            </h2>
            <p class="text-lg text-white">
                I am a passionate web developer with expertise in creating engaging and user-friendly websites.
            </p>
            <button class="px-6 py-3 rounded-full bg-pink-500 text-white mt-6 hover:bg-pink-600">
                Get Started
            </button>
        </div>

        <!-- Login Form -->
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Login</h2>

            <form>
                <div class="mb-4">
                    <label class="block text-lg  font-bold text-gray-900 mb-1">Full Name</label>
                    <input type="text" placeholder="Enter your name"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div class="mb-4">
                    <label class="block text-lg  font-bold text-gray-900 mb-1">Email</label>
                    <input type="email" placeholder="Enter your email"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                    Create Account
                </button>
            </form>
        </div>

    </div>

</div>
</body>
</html>
