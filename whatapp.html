<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 flex items-center justify-center h-screen">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4">


  <div class="w-[320px] h-[600px] bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col">

    
    <div class="bg-green-600 text-white p-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <img src="aditi.jpg" alt="Profile" class="w-10 h-10 rounded-full">
        <div>
          <h2 class="text-sm font-semibold">Family group</h2>
          <p class="text-xs opacity-80">Aditi Binit</p>
        </div>
      </div>
      
    </div>

   
    <div class="flex-1 p-3 space-y-3 overflow-y-auto bg-gray-100">
 
      <div class="bg-white rounded-lg overflow-hidden">
        <img src="https://picsum.photos/300/200" class="w-full">
      </div>

     
      <div class="bg-green-200 p-2 rounded-lg w-fit ml-auto">
        🎤 Voice message
      </div>

      <div class="bg-white p-3 rounded-lg w-fit">
        <p class="text-sm">OMG hahaha, your are  looking so good!</p>
      </div>

     
      <div class="bg-white p-3 rounded-lg w-fit">
        <p class="text-sm">Why are you asking how was their trip</p>
      </div>

      <div class="bg-green-200 p-2 rounded-lg w-fit ml-auto">
        😍 🌸 📷 🌞 👍
      </div>

    </div>

 
    <div class="p-2 bg-gray-100 flex items-center gap-2">
      <input type="text" placeholder="Message"
        class="flex-1 p-2 rounded-full outline-none">
     <button class="bg-green-500 text-white w-8 h-8  rounded-full hover:bg-green-600">
           ➤
      </button>
    </div>

  </div>


</div>

</body>
</html>
