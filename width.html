<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Width Example</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
 
    
<!-- ✅ Responsive Navbar -->
<nav class="bg-blue-600 text-white p-4">
   <div class="w-full md:w-11/12 lg:w-10/12 xl:w-9/12 mx-auto flex justify-between">
       <h1 class="text-xl font-bold">MySite</h1>
       <button class="bg-white text-blue-600 px-4 py-1 rounded w-auto">Login</button>
   </div>
</nav>



<section class="w-full md:w-11/12 lg:w-10/12 xl:w-9/12 mx-auto mt-6">

   <div class="flex flex-wrap">

       <div class="w-full sm:w-1/2 lg:w-1/3 p-3">
           <div class="bg-white p-5 shadow rounded">
               <h3 class="text-xl font-semibold">Card 1</h3>
               <p class="text-gray-500">Responsive width card.</p>
           </div>
       </div>

       <div class="w-full sm:w-1/2 lg:w-1/3 p-3">
           <div class="bg-white p-5 shadow rounded">
               <h3 class="text-xl font-semibold">Card 2</h3>
               <p class="text-gray-500">Responsive width card.</p>
           </div>
       </div>

       <div class="w-full sm:w-1/2 lg:w-1/3 p-3">
           <div class="bg-white p-5 shadow rounded">
               <h3 class="text-xl font-semibold">Card 3</h3>
               <p class="text-gray-500">Responsive width card.</p>
           </div>
       </div>

   </div>

</section>

</body>
</html>
