<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.clock {
  width: 250px;
  height: 250px;
  border: 6px solid #22c55e;
  border-radius: 50%;
  position: relative;
  box-shadow: 0 0 20px #22c55e;
}

.hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom;
  transform: translateX(-50%) rotate(0deg);
  border-radius: 10px;
}

.hour {
  width: 6px;
  height: 60px;
  background: white;
}

.minute {
  width: 4px;
  height: 80px;
  background: #38bdf8;
}

.second {
  width: 2px;
  height: 100px;
  background: red;
}
</style>
</head>

<body class="bg-black flex flex-col justify-center items-center h-screen gap-6">

<div class="clock">
  <div id="hour" class="hand hour"></div>
  <div id="minute" class="hand minute"></div>
  <div id="second" class="hand second"></div>
</div>


<div id="digital" class="text-green-400 text-3xl font-bold"></div>

<script>
function updateClock(){
  let now = new Date();

  let hours = now.getHours();
  let minutes = now.getMinutes();
  let seconds = now.getSeconds();

 
  let hourDeg = (hours % 12) * 30 + minutes * 0.5;
  let minuteDeg = minutes * 6;
  let secondDeg = seconds * 6;

  document.getElementById("hour").style.transform =
    `translateX(-50%) rotate(${hourDeg}deg)`;

  document.getElementById("minute").style.transform =
    `translateX(-50%) rotate(${minuteDeg}deg)`;

  document.getElementById("second").style.transform =
    `translateX(-50%) rotate(${secondDeg}deg)`;

 
  let h = String(hours).padStart(2, '0');
  let m = String(minutes).padStart(2, '0');
  let s = String(seconds).padStart(2, '0');

  document.getElementById("digital").innerText = `${h}:${m}:${s}`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
