<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.box{
    text-align:center;
    padding:50px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(8px);
    box-shadow:0 0 20px cyan, 0 0 40px blue;
    z-index:1;
}

h1{
    color:white;
    font-size:40px;
    letter-spacing:3px;
    text-shadow:0 0 10px cyan,0 0 20px cyan;
}

/* Button */
button{
    margin-top:30px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:cyan;
    color:black;
    font-size:18px;
    cursor:pointer;
    transition:.4s;
}

button:hover{
    transform:scale(1.2);
    box-shadow:0 0 20px cyan;
}


span{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    animation:move 10s linear infinite;
}

@keyframes move{
    from{transform:translateY(0);}
    to{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<div class="box">
    <h1 id="text"></h1>
    <button onclick="msg()">Click Magic ✨</button>
</div>

<script>

let text="WELCOME TO MY CHANNEL";
let i=0;

function typing(){
    if(i<text.length){
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,100);
    }
}
typing();

function msg(){
    alert("🚀 Like Share & Subscribe 🔥");
}

for(let i=0;i<80;i++){
    let star=document.createElement("span");
    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";
    star.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(star);
}

</script>

</body>
</html>
