<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Registration UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 p-10">

<div class="flex flex-wrap justify-center items-end gap-12">

 
  <div class="flex flex-col items-center">
    

    <div class="bg-black p-3 rounded-t-xl w-[420px] shadow-2xl">
      <div class="bg-white h-[260px] rounded-lg p-4 overflow-y-auto">
        <h2 class="text-lg font-bold mb-3 text-center">Register</h2>

        <input class="w-full mb-2 p-2 border rounded" placeholder="Name">
        <input class="w-full mb-2 p-2 border rounded" placeholder="Email">
        <input class="w-full mb-2 p-2 border rounded"  type="password" placeholder="Password">

        <button class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
          Sign Up
        </button>
      </div>
    </div>

  
    <div class="bg-gray-400 h-4 w-[460px] rounded-b-xl shadow-md"></div>
  </div>


 
  <div class="bg-black p-4 rounded-[30px] border-[6px] border-gray-800 w-[320px] shadow-2xl relative">
    
  
    <div class="w-2 h-2 bg-gray-700 rounded-full absolute top-2 left-1/2 -translate-x-1/2"></div>


    <div class="bg-white rounded-xl h-[420px] p-5 mt-4 overflow-y-auto">
      
      <h2 class="text-lg font-bold mb-4 text-center">Register</h2>

      <input class="w-full mb-3 p-2 border rounded" placeholder="Name">
      <input class="w-full mb-3 p-2 border rounded" placeholder="Email">
      <input class="w-full mb-3 p-2 border rounded" type="password" placeholder="Password">

      <button class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">
        Sign Up
      </button>

    </div>
  </div>



  <div class="bg-black p-3 rounded-[30px] w-[200px] shadow-2xl relative">
    

    <div class="w-16 h-2 bg-gray-800 rounded-full absolute top-2 left-1/2 -translate-x-1/2"></div>

    <div class="bg-white rounded-[20px] h-[380px] p-3 mt-4 overflow-y-auto">
      <h2 class="text-sm font-bold mb-2 text-center">Register</h2>

      <input class="w-full mb-2 p-2 border rounded text-sm" placeholder="Name">
      <input class="w-full mb-2 p-2 border rounded text-sm" placeholder="Email">
      <input class="w-full mb-2 p-2 border rounded text-sm" type="password" placeholder="Password">

      <button class="w-full bg-purple-500 text-white p-2 rounded text-sm hover:bg-purple-600">
        Sign Up
      </button>
    </div>
  </div>

</div>

</body>
</html>
