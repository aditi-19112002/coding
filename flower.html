<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class="form-box">
    <h2>Create Account </h2>

    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button>Register</button>

    <p>Already have account? <span>Login</span></p>
  </div>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
  }

  body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #667eea, #764ba2);
  }

  .form-box{
    background:#fff;
    padding:30px;
    width:300px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
  }

  .form-box h2{
    margin-bottom:20px;
  }

  .form-box input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    transition:0.3s;
  }

  .form-box input:focus{
    border-color:#667eea;
    box-shadow:0 0 5px #667eea;
  }

  .form-box button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    background:#667eea;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
  }

  .form-box button:hover{
    background:#5a67d8;
  }

  .form-box p{
    margin-top:10px;
    font-size:14px;
  }

  .form-box span{
    color:#667eea;
    cursor:pointer;
  }
</style>



</body>
</html>
