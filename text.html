<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen">

<div class="text-center">
    
<h1 class="text-3xl font-bold text-white mb-6">Tic Tac Toe</h1>

<div id="board" class="grid grid-cols-3 gap-2 w-64 mx-auto">

<button class="cell bg-white h-20 text-3xl font-bold"></button>
<button class="cell bg-white h-20 text-3xl font-bold"></button>
<button class="cell bg-white h-20 text-3xl font-bold"></button>

<button class="cell bg-white h-20 text-3xl font-bold"></button>
<button class="cell bg-white h-20 text-3xl font-bold"></button>
<button class="cell bg-white h-20 text-3xl font-bold"></button>

<button class="cell bg-white h-20 text-3xl font-bold"></button>
<button class="cell bg-white h-20 text-3xl font-bold"></button>
<button class="cell bg-white h-20 text-3xl font-bold"></button>

</div>

<p id="status" class="text-white mt-6 text-lg">Player X Turn</p>

<button onclick="restartGame()" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">
Restart
</button>

</div>

<script>

let currentPlayer = "X";
let cells = document.querySelectorAll(".cell");
let statusText = document.getElementById("status");

const winPatterns = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

cells.forEach((cell,index)=>{
cell.addEventListener("click",()=>{
if(cell.textContent !== "") return;

cell.textContent = currentPlayer;

if(checkWinner()){
statusText.textContent = `Player ${currentPlayer} Wins!`;
disableBoard();
return;
}

currentPlayer = currentPlayer === "X" ? "O" : "X";
statusText.textContent = `Player ${currentPlayer} Turn`;
});
});

function checkWinner(){
return winPatterns.some(pattern=>{
let [a,b,c] = pattern;
return cells[a].textContent &&
cells[a].textContent === cells[b].textContent &&
cells[a].textContent === cells[c].textContent;
});
}

function disableBoard(){
cells.forEach(cell=>cell.disabled = true);
}

function restartGame(){
cells.forEach(cell=>{
cell.textContent="";
cell.disabled=false;
});
currentPlayer="X";
statusText.textContent="Player X Turn";
}

</script>

</body>
</html>
