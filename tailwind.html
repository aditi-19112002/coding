<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Score</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white">

<div class="bg-gray-800 w-[850px] rounded-xl p-8 shadow-xl">


<h2 class="text-xl font-semibold text-center mb-6">T20 World Cup</h2>


<div class="flex justify-between items-center">


<div class="text-center">
<img src="https://flagcdn.com/w40/in.png" class="mx-auto mb-2">
<h1 class="text-4xl font-bold">255/5</h1>
<p class="text-gray-400">(20)</p>
<p class="mt-1">India</p>
</div>


<div class="text-center">
<span class="text-red-500 text-sm">● Live</span>
<p class="text-gray-400 mt-2">NZ need 209 off 89</p>
</div>


<div class="text-center">
<img src="https://flagcdn.com/w40/nz.png" class="mx-auto mb-2">
<h1 class="text-4xl font-bold">95/5</h1>
<p class="text-gray-400">(5.1)</p>
<p class="mt-1">New Zealand</p>
</div>

</div>


<div class="bg-black rounded-full flex justify-between mt-8 text-sm overflow-hidden">

<button class="px-6 py-2 bg-gray-700 rounded-full">Live</button>
<button class="px-6 py-2 hover:bg-gray-700">Scorecard</button>
<button class="px-6 py-2 hover:bg-gray-700">Commentary</button>
<button class="px-6 py-2 hover:bg-gray-700">Runs</button>

</div>


<div class="mt-6">
<p class="text-gray-400 text-sm mb-2">Current over</p>

<div class="flex space-x-2">
<span class="w-8 h-8 bg-gray-700 flex items-center justify-center rounded">1</span>
<span class="w-8 h-8 bg-gray-700 flex items-center justify-center rounded">4</span>
<span class="w-8 h-8 bg-gray-700 flex items-center justify-center rounded">0</span>
<span class="w-8 h-8 bg-gray-700 flex items-center justify-center rounded">6</span>
<span class="w-8 h-8 bg-gray-700 flex items-center justify-center rounded">2</span>
<span class="w-8 h-8 bg-gray-700 flex items-center justify-center rounded">1</span>
</div>
</div>


<div class="mt-8">

<table class="w-full text-left">

<thead class="text-gray-400 text-sm border-b border-gray-700">
<tr>
<th class="py-2">Batters</th>
<th>R</th>
<th>B</th>
<th>4s</th>
<th>6s</th>
<th>SR</th>
</tr>
</thead>

<tbody class="text-sm">

<tr class="border-b border-gray-700">
<td class="py-2">Tim Seifert</td>
<td>32</td>
<td>16</td>
<td>2</td>
<td>3</td>
<td>200</td>
</tr>

<tr>
<td class="py-2">Finn Allen</td>
<td>9</td>
<td>7</td>
<td>1</td>
<td>0</td>
<td>128.57</td>
</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
