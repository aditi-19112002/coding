<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

  <div class="bg-white p-6 rounded-xl shadow-lg w-80">
    <h1 class="text-2xl font-bold text-center mb-4">📝 To-Do List</h1>

    <div class="flex gap-2">
      <input id="taskInput" type="text" placeholder="Enter task..."
        class="border p-2 w-full rounded-lg outline-none">
      <button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded-lg">Add</button>
    </div>

    <ul id="taskList" class="mt-4 space-y-2"></ul>
  </div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let task = input.value.trim();

  if (task === "") {
    alert("Please enter a task!");
    return;
  }

  let li = document.createElement("li");
  li.className = "flex justify-between bg-gray-200 p-2 rounded-lg";

  li.innerHTML = `
    <span>${task}</span>
    <button onclick="this.parentElement.remove()" class="text-red-500">❌</button>
  `;

  document.getElementById("taskList").appendChild(li);

  input.value = "";
}


document.getElementById("taskInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    addTask();
  }
});
</script>

</body>
</html>
